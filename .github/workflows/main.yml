name: DJI Price Checker

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write # Даваме му права да маже по репото, иначе ще гръмне!

jobs:
  check-price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Ъпдейтнато на v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Ъпдейтнато на v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run price checker
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python check_price.py

      - name: Commit updated price file
        uses: stefanzweifel/git-auto-commit-action@v5 # Това си е най-новото
        with:
          commit_message: "bot: update last seen price [skip ci]"
          file_pattern: last_prices.json
