name: DJI Price Checker

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-price:
    runs-on: ubuntu-latest
    steps:
      # STREAMING_CHUNK:Setting up the environment...
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # STREAMING_CHUNK:Installing dependencies and browsers...
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 cloudscraper playwright

      - name: Install Playwright Browsers
        run: |
          python -m playwright install chromium --with-deps

      # STREAMING_CHUNK:Executing the price check script...
      - name: Run price checker
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python check_price.py

      # STREAMING_CHUNK:Uploading debug artifacts...
      - name: Upload Debug Files
        uses: actions/upload-artifact@v4
        if: always() # Качваме ги винаги, дори ако скриптът гръмне, за да видим защо
        with:
          name: dji-debug-data
          path: |
            dji_debug.html
            dji_screenshot.png
          retention-days: 7

      # STREAMING_CHUNK:Saving changes to the repository...
      - name: Commit updated price file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "bot: update last seen price [skip ci]"
          file_pattern: last_prices.json
